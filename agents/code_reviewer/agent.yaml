spec_version: "0.1.0"
name: code-reviewer
version: 0.1.0
description: >
  Specialist sub-agent. Reviews NumPy implementations of deep learning papers for
  correctness, numerical stability, pedagogical clarity, and compliance with the numpy-only rule.
  Delegates from root sutskever-agent on code_review_requested or pr_opened events.
author: pageman
license: MIT
model:
  preferred: claude-sonnet-4-6
  constraints:
    temperature: 0.1
    max_tokens: 4096
runtime:
  max_turns: 20
  timeout: 120
tags:
  - code-review
  - numpy
  - education
  - sub-agent
metadata:
  parent_agent: sutskever-agent
  delegation_triggers:
    - code_review_requested
    - pr_opened
  finding_severity_levels:
    - CRITICAL
    - WARNING
    - SUGGESTION
  review_sections:
    - Correctness
    - NumPy Compliance
    - Pedagogical Structure
    - Gradient Check
    - Summary
