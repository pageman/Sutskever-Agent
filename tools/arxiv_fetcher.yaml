name: arxiv_fetcher
version: "0.1.0"
description: >
  Fetch paper metadata and abstracts from arXiv by paper ID or title search.
  Used to enrich paper explanations with official abstracts, author lists,
  and publication dates from the primary source.
license: MIT

input_schema:
  type: object
  oneOf:
    - required: ["arxiv_id"]
    - required: ["title_query"]
  properties:
    arxiv_id:
      type: string
      description: "arXiv paper ID without the 'arXiv:' prefix. Example: '1706.03762'"
      pattern: "^\\d{4}\\.\\d{4,5}$"
    title_query:
      type: string
      description: "Free-text title search. Use when arxiv_id is unknown."
    max_results:
      type: integer
      default: 1
      minimum: 1
      maximum: 10
      description: "Maximum results to return. For title searches, returns top N matches."

output_schema:
  type: object
  properties:
    results:
      type: array
      items:
        type: object
        properties:
          arxiv_id:
            type: string
          title:
            type: string
          authors:
            type: array
            items:
              type: string
          abstract:
            type: string
          published:
            type: string
            format: date
            description: "ISO 8601 date string: YYYY-MM-DD"
          url:
            type: string
            description: "Canonical arXiv abstract page URL."
          pdf_url:
            type: string
            description: "Direct PDF link."
    total_found:
      type: integer
      description: "Total results matching the query (may exceed max_results)."

implementation:
  type: api
  endpoint: https://export.arxiv.org/api/query
  method: GET
  auth: none
  timeout: 15
  query_params:
    id_list: "{arxiv_id}"          # used when arxiv_id is provided
    search_query: "ti:{title_query}"  # used when title_query is provided
    max_results: "{max_results}"
  response_format: atom_xml
  parse_notes: >
    Response is Atom XML. Parse <entry> elements: <title>, <author><name>,
    <summary> (abstract), <published>, <id> (canonical URL).
    Strip newlines and excess whitespace from abstract.

annotations:
  requires_confirmation: false
  read_only: true
  cost: none
  rate_limited: false
  note: "arXiv API has no authentication requirement and no hard rate limit for reasonable use."
