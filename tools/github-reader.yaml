name: github-reader
version: "0.1.0"
description: >
  Fetch files, directories, diffs, and PR content from GitHub repositories.
  Used to read the pageman/sutskever-30-implementations source repo without
  requiring a local clone.
input_schema:
  type: object
  required:
    - repo
    - operation
  properties:
    repo:
      type: string
      description: "GitHub repository in owner/name format."
    path:
      type: string
      description: "File or directory path within the repository."
    ref:
      type: string
      description: "Branch, tag, or commit SHA to read from."
      default: "main"
    operation:
      type: string
      enum: ["read_file", "list_dir", "read_diff", "read_pr", "post_pr_comment"]
      description: "The operation to perform."
    pr_number:
      type: integer
      description: "Pull request number. Required for read_pr and post_pr_comment."
    content:
      type: string
      description: "Comment content. Required for post_pr_comment."
output_schema:
  type: object
  properties:
    content:
      type: string
      description: "File content, directory listing, diff text, or PR description."
    sha:
      type: string
      description: "Commit SHA of the fetched ref."
    truncated:
      type: boolean
      description: "True if content was truncated due to size limits."
implementation:
  type: http
  url: https://api.github.com
  method: GET
  timeout: 30
  headers:
    Accept: "application/vnd.github.v3+json"
annotations:
  requires_confirmation: false
  read_only: true
  cost: none
