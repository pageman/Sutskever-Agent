name: notebook-parser
version: "0.1.0"
description: >
  Parse a Jupyter notebook (.ipynb JSON) into a structured array of cells with
  type, source, output, and metadata. Enables reasoning about individual cells
  rather than raw JSON.
input_schema:
  type: object
  required:
    - content
  properties:
    content:
      type: string
      description: "Raw .ipynb JSON string, typically piped from github-reader."
    filter_cell_type:
      type: string
      enum: ["code", "markdown", "raw", "all"]
      default: "all"
      description: "Return only cells of this type."
    include_outputs:
      type: boolean
      default: true
      description: "Whether to include cell execution outputs in the result."
output_schema:
  type: object
  properties:
    cells:
      type: array
      items:
        type: object
        properties:
          index:
            type: integer
          type:
            type: string
          source:
            type: string
          outputs:
            type: array
          metadata:
            type: object
    cell_count:
      type: integer
implementation:
  type: script
  path: notebook-parser.py
  runtime: python3
  timeout: 10
annotations:
  requires_confirmation: false
  read_only: true
  cost: none
