name: on_pr_opened
version: "0.1.0"
description: >
  Fires when a pull request is opened in pageman/sutskever-30-implementations.
  Triggers the pr_review_pipeline workflow.

hooks:
  on_pr_opened:
    - id: detect_pr_event
      description: >
        Detect PR opened event in pageman/sutskever-30-implementations.
        Extract pr_number, pr_title, pr_author from the event payload.
      timeout: 10
      fail_open: false
      on_failure: abort_and_log

    - id: trigger_review_pipeline
      description: >
        Trigger pr_review_pipeline workflow with the extracted pr_number.
        Pass full event payload as workflow context.
      timeout: 300
      fail_open: false
      action: invoke_workflow
      workflow: pr_review_pipeline
      args:
        pr_number: "{event.pr_number}"
        pr_title: "{event.pr_title}"

    - id: log_pr_event
      description: Log PR event to memory/session_notes.md for audit trail
      timeout: 5
      fail_open: true
      action: append_to_memory
      target: memory/session_notes.md
      content: "PR #{pr_number} opened by {pr_author} — review pipeline triggered at {timestamp}"
