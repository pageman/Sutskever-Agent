name: on_start
version: "0.1.0"
description: Fires at the beginning of every session. Loads memory, detects new users, primes context.

hooks:
  on_session_start:
    - id: load_memory
      description: Load user progress from memory/user_progress.yaml into working context
      timeout: 5
      fail_open: true
      on_failure: proceed_with_empty_progress

    - id: detect_new_user
      description: >
        Check if this is a new user (session_count == 0 or completed_papers is empty).
        If new user, set flag to trigger onboard_new_user workflow after context load.
      timeout: 5
      fail_open: true

    - id: load_paper_index
      description: >
        Load knowledge/paper_index.yaml into working context so all 30 paper entries
        are available for lookup without a tool call during the session.
      timeout: 5
      fail_open: false
      on_failure: log_error_and_continue

    - id: trigger_onboard
      description: >
        If new_user flag is set from detect_new_user step:
        trigger onboard_new_user workflow.
        Otherwise: greet returning user and offer to continue from last session.
      timeout: 5
      fail_open: true
      condition: new_user == true
      action: invoke_workflow
      workflow: onboard_new_user
