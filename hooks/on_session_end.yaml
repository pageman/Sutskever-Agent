name: on_session_end
version: "0.1.0"
description: >
  Fires at the end of every session. Saves progress, writes session notes,
  and archives if rotation threshold is reached.

hooks:
  on_session_end:
    - id: write_session_summary
      description: >
        Write a brief session summary to memory/session_notes.md.
        Include: date, track, papers studied, completion status, next paper, open questions.
      timeout: 10
      fail_open: true
      action: append_to_memory
      target: memory/session_notes.md
      format: |
        ## Session — {current_date}
        Track: {current_track} | Paper: {current_paper_id} ({paper_title}) | Status: {status}
        Next: {suggested_next_paper}
        Open questions: {open_questions_summary}

    - id: update_progress
      description: >
        Update memory/user_progress.yaml:
        - completed_papers: append any papers marked complete this session
        - current_paper_id: update to next paper if current was completed
        - last_session: set to today's date
        - session_count: increment by 1
        - open_questions: append any unresolved questions from this session
      timeout: 10
      fail_open: true
      action: write_memory
      target: memory/user_progress.yaml

    - id: archive_check
      description: >
        If session_count % 10 == 0: archive current session_notes.md to
        memory/archive/session_notes_{year}_{month}.md and reset session_notes.md.
      timeout: 15
      fail_open: true
      condition: session_count % 10 == 0
      action: rotate_memory
      source: memory/session_notes.md
      archive_target: "memory/archive/session_notes_{year}_{month}.md"
